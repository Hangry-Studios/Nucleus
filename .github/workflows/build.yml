name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build and package IPA
        run: |
          xcodebuild -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p build/ipa/Payload
          cp -r build/App.xcarchive/Products/Applications/App.app build/ipa/Payload/
          cd build/ipa
          zip -r ../Nucleus.ipa Payload
          cd ../..
          mkdir -p build/ipa_final
          mv build/Nucleus.ipa build/ipa_final/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Nucleus-IPA
          path: build/ipa_final/Nucleus.ipa